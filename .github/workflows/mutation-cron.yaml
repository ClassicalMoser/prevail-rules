# One Stryker run per matrix row. Use a scalar matrix (`shard`) so GitHub fans out to
# multiple jobs; do not use `name` inside matrix.include — it is reserved and collapses the matrix.
# Parallelism = multiple jobs at once (subject to org concurrency); `--mutate` only shrinks each run.
name: Mutation tests

on:
  schedule:
    # UTC-only cron: 06:00 UTC = midnight Chicago in CST; 01:00 Chicago in CDT (no single UTC time matches both).
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  mutation:
    name: Mutation (${{ matrix.shard }})
    strategy:
      fail-fast: false
      matrix:
        shard:
          - procedures
          - transforms
          - queries
          - entities-validation
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mutation tests
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          case "$SHARD" in
            procedures)
              PATTERN='src/domain/procedures/**/*.{ts,js}'
              ;;
            transforms)
              PATTERN='src/domain/transforms/**/*.{ts,js}'
              ;;
            queries)
              PATTERN='src/domain/queries/**/*.{ts,js}'
              ;;
            entities-validation)
              PATTERN='src/domain/entities/**/*.{ts,js},src/domain/validation/**/*.{ts,js},src/domain/events/**/*.{ts,js},src/domain/ruleValues/**/*.{ts,js}'
              ;;
            *)
              echo "Unknown shard: $SHARD"
              exit 1
              ;;
          esac
          pnpm exec stryker run --mutate "${PATTERN},!src/domain/**/*.test.{ts,js},!src/domain/testing/**/*.{ts,js},!src/domain/sampleValues/**/*.{ts,js},!dist/**/*.{ts,js},!**/index.{ts,js}"

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-report-${{ matrix.shard }}
          path: reports/
          if-no-files-found: warn
